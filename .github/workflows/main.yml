name: iOS 2026 True Compiler
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Pro Compiler Tools
        run: brew install xcodegen
          
      - name: Generate iOS Ignition File
        run: |
          # This writes the core boot file iOS needs to launch your dashboard
          cat << 'EOF' > App.swift
          import SwiftUI
          @main
          struct RegeditApp: App {
              var body: some Scene {
                  WindowGroup {
                      MainViewWrapper().ignoresSafeArea()
                  }
              }
          }
          struct MainViewWrapper: UIViewControllerRepresentable {
              func makeUIViewController(context: Context) -> MainViewController {
                  return MainViewController()
              }
              func updateUIViewController(_ uiViewController: MainViewController, context: Context) {}
          }
          EOF
          
      - name: Generate Master Xcode Blueprint
        run: |
          # This creates the .xcodeproj file dynamically without needing a PC
          cat << 'EOF' > project.yml
          name: Engine
          options:
            bundleIdPrefix: com.fox
          targets:
            Engine:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources:
                - path: .
                  excludes: [".github"]
              settings:
                CODE_SIGNING_ALLOWED: NO
                CODE_SIGNING_REQUIRED: NO
          EOF
          xcodegen generate
          
      - name: Compile Real Executable Binary
        run: |
          # Uses Apple's official compiler to build the actual application
          xcodebuild archive -project Engine.xcodeproj -scheme Engine -configuration Release -archivePath build/Engine.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          
          # Packages the compiled executable into the final IPA
          mkdir -p Payload
          cp -r build/Engine.xcarchive/Products/Applications/*.app Payload/
          zip -r Regedit_Compiled_2026.ipa Payload
          
      - name: Upload Installable App
        uses: actions/upload-artifact@v4
        with:
          name: Regedit-Compiled-IPA
          path: Regedit_Compiled_2026.ipa
